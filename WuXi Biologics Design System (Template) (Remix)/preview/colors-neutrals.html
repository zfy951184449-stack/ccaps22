<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row7 { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }
  .sw { display: flex; flex-direction: column; gap: 3px; }
  .chip { height: 56px; border-radius: 5px; border: 1px solid rgba(15,27,45,0.08); }
  .name { font-size: 11px; font-weight: 600; color: var(--wx-ink); }
  .hex  { font-family: var(--wx-font-mono); font-size: 10px; color: var(--wx-fg-3); }
</style></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Neutrals · Surfaces, Borders, Text</div>
  <div class="row7">
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><span class="name">Bg</span><span class="hex">#FFFFFF</span></div>
    <div class="sw"><div class="chip" style="background:#FAFCFE"></div><span class="name">Surface 1</span><span class="hex">#FAFCFE</span></div>
    <div class="sw"><div class="chip" style="background:#F5F8FB"></div><span class="name">Surface 2</span><span class="hex">#F5F8FB</span></div>
    <div class="sw"><div class="chip" style="background:#EDF1F6"></div><span class="name">Surface 3</span><span class="hex">#EDF1F6</span></div>
    <div class="sw"><div class="chip" style="background:#E4EAF1"></div><span class="name">Border</span><span class="hex">#E4EAF1</span></div>
    <div class="sw"><div class="chip" style="background:#C7D1DD"></div><span class="name">Border ·</span><span class="hex">#C7D1DD</span></div>
    <div class="sw"><div class="chip" style="background:#8898A8"></div><span class="name">FG 4</span><span class="hex">#8898A8</span></div>
    <div class="sw"><div class="chip" style="background:#5A6B7E"></div><span class="name">FG 3</span><span class="hex">#5A6B7E</span></div>
    <div class="sw"><div class="chip" style="background:#3A4A5C"></div><span class="name">FG 2</span><span class="hex">#3A4A5C</span></div>
    <div class="sw"><div class="chip" style="background:#0F1B2D"></div><span class="name">Ink</span><span class="hex">#0F1B2D</span></div>
  </div>
</div></body></html>
