<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  .cell { display: flex; flex-direction: column; gap: 4px; }
  .lbl { font-size: 11px; font-weight:500; color: var(--wx-fg-3); letter-spacing:0.04em; text-transform:uppercase;}
  .metric { font: 600 36px/1.1 Inter, sans-serif; color:#0F1B2D; font-variant-numeric: tabular-nums; letter-spacing:-0.02em;}
  .unit { font-size: 16px; font-weight: 500; color: var(--wx-fg-3); margin-left: 4px;}
  .delta { font-size: 12px; font-weight: 500; font-variant-numeric: tabular-nums;}
  .up { color: #1F7A53; }
  .down { color: #A2342A; }
  .mono { font-family: var(--wx-font-mono); font-size: 13px; color: #3A4A5C;}
  .mono-block { background:#F5F8FB; border:1px solid var(--wx-border); border-radius:6px; padding:10px 12px; font-family: var(--wx-font-mono); font-size: 12.5px; color:#0F1B2D; line-height:1.6;}
</style></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Type · Metrics &amp; Mono</div>
  <div class="grid">
    <div class="cell"><span class="lbl">Capacity Utilization</span><span class="metric">78<span class="unit">%</span></span><span class="delta up">▲ 4.2 pts WoW</span></div>
    <div class="cell"><span class="lbl">Active Batches</span><span class="metric">24</span><span class="delta up">▲ 2 vs last week</span></div>
    <div class="cell"><span class="lbl">Open Deviations</span><span class="metric">3</span><span class="delta down">▲ 1 vs last week</span></div>
  </div>
  <div style="height:14px;"></div>
  <div class="mono-block">Lot: BX-2418-A03 · BR-204 · 12,400 L · 36.2 °C · pH 7.10 ±0.05</div>
</div></body></html>
