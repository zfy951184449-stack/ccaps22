<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 4px; }
  .chip {
    height: 64px; border-radius: 6px;
    border: 1px solid rgba(15,27,45,0.06);
  }
  .name { font-size: 11px; font-weight: 600; color: var(--wx-ink); letter-spacing: -0.005em; }
  .hex  { font-family: var(--wx-font-mono); font-size: 10.5px; color: var(--wx-fg-3); }
</style></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Brand · Blue Scale</div>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#082A5C"></div><span class="name">Blue 900</span><span class="hex">#082A5C</span></div>
    <div class="sw"><div class="chip" style="background:#0A3470"></div><span class="name">Blue 800</span><span class="hex">#0A3470</span></div>
    <div class="sw"><div class="chip" style="background:#0B3D7F"></div><span class="name">Blue 700 · WuXi</span><span class="hex">#0B3D7F</span></div>
    <div class="sw"><div class="chip" style="background:#1556B5"></div><span class="name">Blue 600</span><span class="hex">#1556B5</span></div>
    <div class="sw"><div class="chip" style="background:#1F6FEB"></div><span class="name">Blue 500 · Tech</span><span class="hex">#1F6FEB</span></div>
    <div class="sw"><div class="chip" style="background:#5A93F0"></div><span class="name">Blue 400</span><span class="hex">#5A93F0</span></div>
    <div class="sw"><div class="chip" style="background:#9DBEF5"></div><span class="name">Blue 300</span><span class="hex">#9DBEF5</span></div>
    <div class="sw"><div class="chip" style="background:#C7DCF7"></div><span class="name">Blue 200</span><span class="hex">#C7DCF7</span></div>
    <div class="sw"><div class="chip" style="background:#E6F2FB"></div><span class="name">Blue 100 · Sky</span><span class="hex">#E6F2FB</span></div>
    <div class="sw"><div class="chip" style="background:#F2F7FC"></div><span class="name">Blue 50</span><span class="hex">#F2F7FC</span></div>
  </div>
</div></body></html>
