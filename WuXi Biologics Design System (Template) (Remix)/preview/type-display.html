<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack > div { padding: 8px 0; border-bottom: 1px solid var(--wx-divider); }
  .stack > div:last-child { border-bottom: none; }
  .label { font-family: var(--wx-font-mono); font-size: 11px; color: var(--wx-fg-3); display:inline-block; min-width: 92px; }
  .h1 { font: 600 36px/1.2 Inter, sans-serif; letter-spacing:-0.01em; color:#0F1B2D;}
  .h2 { font: 600 28px/1.3 Inter, sans-serif; letter-spacing:-0.005em; color:#0F1B2D;}
  .h3 { font: 600 22px/1.3 Inter, sans-serif; color:#0F1B2D;}
  .h4 { font: 600 18px/1.3 Inter, sans-serif; color:#0F1B2D;}
</style></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:12px;">Type · Display Scale (Inter)</div>
  <div class="stack">
    <div><span class="label">H1 · 36/600</span><span class="h1">Bioreactor Operations</span></div>
    <div><span class="label">H2 · 28/600</span><span class="h2">Batch Execution Console</span></div>
    <div><span class="label">H3 · 22/600</span><span class="h3">Quality Events This Week</span></div>
    <div><span class="label">H4 · 18/600</span><span class="h4">Deviation DEV-2026-0418</span></div>
  </div>
</div></body></html>
