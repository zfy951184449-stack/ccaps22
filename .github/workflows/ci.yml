name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      agent_docs: ${{ steps.filter.outputs.agent_docs }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      frontend_next: ${{ steps.filter.outputs.frontend_next }}
      v4: ${{ steps.filter.outputs.v4 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            agent_docs:
              - 'AGENTS.md'
              - '.agent/**'
              - 'docs/**'
              - 'scripts/lint_agent_docs.sh'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - 'database/**'
              - 'scripts/ci/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            frontend_next:
              - 'frontend-next/**'
              - 'start_frontend_next.sh'
              - 'scripts/启动项目_next.command'
              - '.github/workflows/ci.yml'
            v4:
              - 'solver_v4/**'
              - 'backend/src/services/schedulingV4/**'
              - 'backend/src/controllers/schedulingV4Controller.ts'
              - 'frontend/src/components/SolverV4/**'
              - 'scripts/verify_v4_archive.sh'
              - '.github/workflows/ci.yml'

  agent-docs:
    name: Agent Docs Sanity
    needs: changes
    if: needs.changes.outputs.agent_docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run agent-doc lint
        run: |
          chmod +x ./scripts/lint_agent_docs.sh
          ./scripts/lint_agent_docs.sh

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: aps_system
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      CI: true
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: aps_system

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Ensure MySQL client is available
        run: |
          if ! command -v mysql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y mysql-client
          fi

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Initialize MySQL schema for integration tests
        run: ./scripts/ci/init_mysql_ci.sh

      - name: Run backend build
        working-directory: backend
        run: npm run build

      - name: Run backend CI-safe tests
        working-directory: backend
        run: npm run test:ci

      - name: Run backend DB integration tests
        working-directory: backend
        run: npm run test:db

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

  frontend-next:
    name: Frontend Next
    needs: changes
    if: needs.changes.outputs.frontend_next == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install frontend-next dependencies
        working-directory: frontend-next
        run: npm ci

      - name: Run frontend-next lint
        working-directory: frontend-next
        run: npm run lint

      - name: Run frontend-next typecheck
        working-directory: frontend-next
        run: npm run typecheck

      - name: Run frontend-next tests
        working-directory: frontend-next
        run: npm run test:ci

      - name: Run frontend-next build
        working-directory: frontend-next
        run: npm run build

      - name: Run frontend-next Storybook build
        working-directory: frontend-next
        run: npm run storybook:build

      - name: Install Playwright browsers
        working-directory: frontend-next
        run: npx playwright install --with-deps chromium

      - name: Run frontend-next E2E
        working-directory: frontend-next
        run: npm run e2e

  v4:
    name: Solver V4 Guardrails
    needs: changes
    if: needs.changes.outputs.v4 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: solver_v4/requirements.txt

      - name: Ensure ripgrep is available
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install solver dependencies
        working-directory: solver_v4
        run: pip install -r requirements.txt

      - name: Run V4 archive verification
        run: ./scripts/verify_v4_archive.sh
