<svg viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg"><title>技术架构</title><desc>前端经 /api 代理调后端，后端用 HTTP 调排班求解器并接收其回调，后端读写 MySQL；浏览器不直连求解器，求解器不直连数据库。</desc><defs><marker id="g" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#5A6472"/></marker></defs><rect width="680" height="380" fill="#FFFFFF"/><rect x="30" y="110" width="150" height="84" rx="10" fill="#E8F1FB" stroke="#2E6FB0" stroke-width="1.5"/><text x="105" y="147" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0C447C" font-family="'PingFang SC','Microsoft YaHei',sans-serif">前端（浏览器）</text><text x="105" y="169" text-anchor="middle" font-size="11.5" fill="#3A6EA5" font-family="'PingFang SC','Microsoft YaHei',sans-serif">React（CRA）</text><rect x="265" y="110" width="150" height="84" rx="10" fill="#E8F1FB" stroke="#2E6FB0" stroke-width="1.5"/><text x="340" y="147" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0C447C" font-family="'PingFang SC','Microsoft YaHei',sans-serif">后端 API</text><text x="340" y="169" text-anchor="middle" font-size="11.5" fill="#3A6EA5" font-family="'PingFang SC','Microsoft YaHei',sans-serif">Express + TypeScript</text><rect x="500" y="110" width="150" height="84" rx="10" fill="#E8F1FB" stroke="#2E6FB0" stroke-width="1.5"/><text x="575" y="147" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0C447C" font-family="'PingFang SC','Microsoft YaHei',sans-serif">排班求解器 V4</text><text x="575" y="169" text-anchor="middle" font-size="11.5" fill="#3A6EA5" font-family="'PingFang SC','Microsoft YaHei',sans-serif">Flask + OR-Tools</text><rect x="265" y="265" width="150" height="70" rx="10" fill="#EEF1F5" stroke="#8A94A6" stroke-width="1.5"/><text x="340" y="297" text-anchor="middle" font-size="14.5" font-weight="700" fill="#2B3340" font-family="'PingFang SC','Microsoft YaHei',sans-serif">数据库</text><text x="340" y="317" text-anchor="middle" font-size="11.5" fill="