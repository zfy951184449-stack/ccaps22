<svg viewBox="0 0 920 1300" role="img" xmlns="http://www.w3.org/2000/svg"><title>V4 自动排班求解流水线</title><desc>数据库取数、装配为 SolverRequest、CP-SAT 按约束与目标求解、结果落库并经 SSE 回传。</desc><defs><marker id="dn" markerWidth="11" markerHeight="11" refX="4" refY="8" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,0 L4,8 Z" fill="#5A6472"/></marker></defs><rect width="920" height="1300" fill="#FFFFFF"/><rect x="40" y="30" width="840" height="102" rx="9" fill="#EEF1F5" stroke="#8A94A6" stroke-width="1.4"/><text x="60" y="56" font-size="14" fill="#2B3340" font-weight="700" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">① 数据库取数（只读，DataAssemblerV4 两批并行）</text><rect x="60" y="70" width="250" height="40" rx="9" fill="#E8F1FB" stroke="#2E6FB0" stroke-width="1.4"/><text x="72" y="95" font-size="11.5" fill="#0C447C" font-weight="600" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">基础数据 13 表</text><rect x="330" y="70" width="250" height="40" rx="9" fill="#E3F4F0" stroke="#2E9C8E" stroke-width="1.4"/><text x="342" y="95" font-size="11.5" fill="#0B4A43" font-weight="600" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">生产计划 9 表</text><rect x="600" y="70" width="260" height="40" rx="9" fill="#F3ECFB" stroke="#8A5CC0" stroke-width="1.4"/><text x="612" y="95" font-size="11.5" fill="#46297A" font-weight="600" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">排班 4 表（班次/历史/锁定）</text><text x="72" y="122" font-size="9.5" fill="#5A6472" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">过滤：批次 plan_status=ACTIVATED · 工序在窗口内 · 团队按组织树递归取子树</text><line x1="460" y1="132" x2="460" y2="150" stroke="#5A6472" stroke-width="2" marker-end="url(#dn)"/><rect x="40" y="150" width="840" height="78" rx="9" fill="#FBF0E5" stroke="#C98A3A" stroke-width="1.4"/><text x="60" y="176" font-size="14" fill="#7A4A12" font-weight="700" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">② Node 层预筛与装配</text><text x="60" y="198" font-size="10.5" fill="#9A6A2A" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">候选员工预筛：资质硬过滤（is_mandatory 需求须有对应资质且 level≥要求）＋ 不可用期重叠淘汰，压缩求解空间</text><text x="60" y="216" font-size="10.5" fill="#9A6A2A" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">再装配为 SolverRequest（request_id 现造，window/solve_range/config 为入参）</text><line x1="460" y1="228" x2="460" y2="258" stroke="#5A6472" stroke-width="2" marker-end="url(#dn)"/><rect x="40" y="258" width="840" height="150" rx="9" fill="#E8F1FB" stroke="#2E6FB0" stroke-width="1.4"/><text x="60" y="284" font-size="14" fill="#0C447C" font-weight="700" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">③ SolverRequest 契约（19 个顶层字段）</text><text x="60" y="308" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· operation_demands 工序用工需求</text><text x="340" y="308" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· employee_profiles 员工+资质</text><text x="620" y="308" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· calendar 工作日/三倍薪</text><text x="60" y="325" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· shift_definitions 班次</text><text x="340" y="325" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· shared_preferences 共享组</text><text x="620" y="325" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· special_shift_requirements 专项班</text><text x="60" y="342" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· locked_operations 锁定工序</text><text x="340" y="342" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· locked_shifts 锁定班次</text><text x="620" y="342" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· historical_shifts 历史班</text><text x="60" y="359" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· resources 资源</text><text x="340" y="359" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· resource_calendars 资源日历</text><text x="620" y="359" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· operation_resource_requirements 资源需求</text><text x="60" y="376" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· maintenance_windows 维保窗</text><text x="340" y="376" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· frozen_shifts 冻结班次</text><text x="620" y="376" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· frozen_assignments 冻结分配</text><text x="60" y="393" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· window / solve_range 区间</text><text x="340" y="393" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· config 配置/权重/开关</text><text x="620" y="393" font-size="10" fill="#3A6EA5" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· request_id 运行号</text><line x1="460" y1="408" x2="460" y2="448" stroke="#5A6472" stroke-width="2" marker-end="url(#dn)"/><text x="478" y="432" font-size="10.5" fill="#0C447C" font-weight="600" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">POST /api/v4/solve → Flask 求解器（浏览器不直连求解器）</text><rect x="40" y="448" width="840" height="560" rx="9" fill="#FBF0E5" stroke="#C98A3A" stroke-width="1.4"/><text x="60" y="474" font-size="14" fill="#7A4A12" font-weight="700" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">④ CP-SAT 求解（按 registry 顺序加约束 → 加权和单目标最小化）</text><rect x="56" y="488" width="470" height="504" rx="9" fill="#FFFFFF" stroke="#C98A3A" stroke-width="1"/><text x="70" y="510" font-size="12" fill="#7A4A12" font-weight="700" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">约束 16 条（CORE 6 + SHIFT 10）</text><text x="70" y="532" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· FrozenRange 区间外钉死历史值（硬·必首位）</text><text x="70" y="560" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· ShiftAssignment 每人每天一班，班覆盖工序（硬）</text><text x="70" y="588" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· ShareGroup 共享组同一批人（硬）</text><text x="70" y="616" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· UniqueEmployee 同人不排重叠工序（硬）</text><text x="70" y="644" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· LockedOperations 保留锁定的人-工序（硬）</text><text x="70" y="672" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· LockedShifts 保留锁定的班次（硬）</text><text x="70" y="700" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· OnePosition 一工序一员工占一岗（硬）</text><text x="70" y="728" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· EmployeeAvailability 不可用期不排（硬）</text><text x="70" y="756" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· StandardHours 月工时落在 [标准-4,+32]（硬）</text><text x="70" y="784" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· ConsecutiveDays 连上≤6 / 连休≤4（硬）</text><text x="70" y="812" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· NightShift 夜班休息/禁孤立/间隔（硬+软）</text><text x="70" y="840" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· LeadershipCoverage 生产日≥1 leader 等（硬+软）</text><text x="70" y="868" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· FlexibleScheduling 柔性任务窗口内放一次（硬）</text><text x="70" y="896" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· PreferStandardShift 标准班够用不开特殊班（硬）</text><text x="70" y="924" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· SpecialShiftJointCoverage 专项班覆盖（硬/软可配）</text><text x="70" y="952" font-size="10" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· ConsecutiveWorkRestPattern 连上连休块（硬·默认关）</text><rect x="544" y="488" width="320" height="504" rx="9" fill="#FFFFFF" stroke="#C98A3A" stroke-width="1"/><text x="558" y="510" font-size="12" fill="#7A4A12" font-weight="700" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">目标 10 项（加权求和，统一最小化）</text><text x="558" y="538" font-size="10.5" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· O0 专项班欠配最小化（最高优先）</text><text x="558" y="568" font-size="10.5" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· O1 岗位空缺最小化（高峰/非标时段加权）</text><text x="558" y="598" font-size="10.5" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· O2 专项班对常规排班影响最小化</text><text x="558" y="628" font-size="10.5" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· O3 工时偏差最小化 |实际-标准|</text><text x="558" y="658" font-size="10.5" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· O4 特殊班使用数最小化</text><text x="558" y="688" font-size="10.5" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· O5 夜班均衡（平方和）</text><text x="558" y="718" font-size="10.5" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· O6 周末/节假日工作均衡（平方和）</text><text x="558" y="748" font-size="10.5" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· O7 三倍薪日成本最小化</text><text x="558" y="778" font-size="10.5" fill="#4A3A22" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">· O8 管理岗覆盖软惩罚</text><text x="558" y="808" font-size="9.5" fill="#9A6A2A" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">注：MinimizeTotalHours 已被 O3 取代，未装配</text><line x1="460" y1="1008" x2="460" y2="1048" stroke="#5A6472" stroke-width="2" marker-end="url(#dn)"/><rect x="40" y="1048" width="840" height="96" rx="9" fill="#F3ECFB" stroke="#8A5CC0" stroke-width="1.4"/><text x="60" y="1074" font-size="14" fill="#46297A" font-weight="700" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">⑤ 结果落库 + 进度回传</text><rect x="60" y="1088" width="250" height="42" rx="9" fill="#FFFFFF" stroke="#8A5CC0" stroke-width="1"/><text x="72" y="1108" font-size="10.5" fill="#46297A" font-weight="600" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">employee_shift_plans</text><text x="72" y="1123" font-size="9.5" fill="#6A4A98" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">员工×日期班表</text><rect x="330" y="1088" width="250" height="42" rx="9" fill="#FFFFFF" stroke="#8A5CC0" stroke-width="1"/><text x="342" y="1108" font-size="10" fill="#46297A" font-weight="600" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">batch_personnel_assignments</text><text x="342" y="1123" font-size="9.5" fill="#6A4A98" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">员工×批次工序岗位</text><rect x="600" y="1088" width="260" height="42" rx="9" fill="#FFFFFF" stroke="#8A5CC0" stroke-width="1"/><text x="612" y="1108" font-size="10.5" fill="#46297A" font-weight="600" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">scheduling_runs</text><text x="612" y="1123" font-size="9.5" fill="#6A4A98" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">运行记录 · solver_progress</text><text x="60" y="1142" font-size="9.5" fill="#6A4A98" font-weight="400" text-anchor="start" font-family="'PingFang SC','Microsoft YaHei',sans-serif">求解中：进度增量经回调写 scheduling_runs.solver_progress，再经 SSE 推前端；审核后 apply 才写入上面两张生产表。</text></svg>