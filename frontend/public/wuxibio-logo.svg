<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- WuXi Biologics Logo Inspired Design -->
  <!-- Molecular Structure Icon -->
  <g id="molecular-icon">
    <circle cx="25" cy="30" r="6" fill="#0ea5e9" opacity="0.8"/>
    <circle cx="40" cy="20" r="5" fill="#06b6d4" opacity="0.9"/>
    <circle cx="40" cy="40" r="5" fill="#14b8a6" opacity="0.9"/>
    <circle cx="52" cy="30" r="4" fill="#0ea5e9" opacity="0.7"/>
    
    <!-- Connection Lines -->
    <line x1="25" y1="30" x2="40" y2="20" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
    <line x1="25" y1="30" x2="40" y2="40" stroke="#14b8a6" stroke-width="2" opacity="0.6"/>
    <line x1="40" y1="20" x2="52" y2="30" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="40" x2="52" y2="30" stroke="#0ea5e9" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- WuXi Biologics Text -->
  <text x="65" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    WuXi Biologics
  </text>
  
  <!-- APS Subtitle -->
  <text x="65" y="45" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="0.5">
    APS System
  </text>
</svg>
